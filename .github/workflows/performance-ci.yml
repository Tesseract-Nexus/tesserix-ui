name: Performance CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance report
        run: npm run perf:report

      - name: Upload performance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: artifacts/performance-report.json
          if-no-files-found: error

      - name: Add performance summary
        run: |
          echo "## Performance Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/performance-report.json >> "$GITHUB_STEP_SUMMARY"
